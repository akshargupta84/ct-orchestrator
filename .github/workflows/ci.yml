name: CI/CD Pipeline

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        continue-on-error: true
        run: ruff check . --output-format=github

      - name: Run ruff formatter check
        continue-on-error: true
        run: ruff format --check .

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements-local.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          DEMO_MODE: "true"
          ANTHROPIC_API_KEY: "test-key-not-real"
        run: |
          pytest tests/ -v --tb=short --cov=services --cov=models --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────────
  # Job 3: Docker Build (verify it builds)
  # ─────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ct-orchestrator:test .

  # ─────────────────────────────────────────────
  # Job 4: Deploy to HuggingFace Spaces
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://akshargupta84:$HF_TOKEN@huggingface.co/spaces/akshargupta84/ct-orchestrator main
